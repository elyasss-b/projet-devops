[k3s_master]
master ansible_host=MASTER_IP_HERE ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

[k3s_worker]
worker ansible_host=WORKER_IP_HERE ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

[k3s_cluster:children]
k3s_master
k3s_worker

[k3s_cluster:vars]
ansible_python_interpreter=/usr/bin/python3
