---
# ============================================
# Playbook principal - Setup complet du cluster
# ============================================

# --- Étape 1 : Prérequis sur tous les noeuds ---
- name: Setup common packages on all nodes
  hosts: k3s_cluster
  become: true
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - software-properties-common
          - python3-pip
          - git
          - htop
          - jq
        state: present

    - name: Install Docker (via convenience script)
      shell: |
        if ! command -v docker &> /dev/null; then
          curl -fsSL https://get.docker.com | sh
        fi
      args:
        creates: /usr/bin/docker

    - name: Add user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    - name: Ensure Docker is running
      service:
        name: docker
        state: started
        enabled: yes

# --- Étape 2 : Installer K3s Master ---
- name: Setup K3s Master
  hosts: k3s_master
  become: true
  tasks:
    - name: Install K3s server
      shell: |
        if ! command -v k3s &> /dev/null; then
          curl -sfL https://get.k3s.io | sh -s - \
            --write-kubeconfig-mode 644 \
            --disable traefik \
            --node-name master
        fi
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for K3s to be ready
      shell: k3s kubectl get nodes
      register: k3s_ready
      retries: 10
      delay: 10
      until: k3s_ready.rc == 0

    - name: Get K3s token
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token

    - name: Store token as fact
      set_fact:
        k3s_master_token: "{{ k3s_token.content | b64decode | trim }}"
        k3s_master_ip: "{{ ansible_host }}"

    - name: Copy kubeconfig to user home
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "/home/{{ ansible_user }}/.kube/config"
        remote_src: yes
        owner: "{{ ansible_user }}"
        mode: "0600"

    - name: Create .kube directory
      file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        owner: "{{ ansible_user }}"
        mode: "0755"

    - name: Fix kubeconfig server address
      replace:
        path: "/home/{{ ansible_user }}/.kube/config"
        regexp: "127.0.0.1"
        replace: "{{ ansible_host }}"

# --- Étape 3 : Joindre le Worker au cluster ---
- name: Setup K3s Worker
  hosts: k3s_worker
  become: true
  tasks:
    - name: Install K3s agent
      shell: |
        if ! command -v k3s &> /dev/null; then
          curl -sfL https://get.k3s.io | K3S_URL=https://{{ hostvars[groups['k3s_master'][0]].ansible_host }}:6443 \
            K3S_TOKEN={{ hostvars[groups['k3s_master'][0]].k3s_master_token }} \
            sh -s - --node-name worker
        fi
      args:
        creates: /usr/local/bin/k3s

# --- Étape 4 : Installer Nginx Ingress Controller ---
- name: Setup Ingress Controller
  hosts: k3s_master
  become: false
  tasks:
    - name: Install nginx ingress controller
      shell: |
        kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.9.4/deploy/static/provider/cloud/deploy.yaml
      register: ingress_result
      changed_when: "'created' in ingress_result.stdout"

# --- Étape 5 : Déployer l'application ---
- name: Deploy Todo Application
  hosts: k3s_master
  become: false
  tasks:
    - name: Copy K8s manifests
      copy:
        src: "{{ playbook_dir }/../k8s/"
        dest: "/home/{{ ansible_user }}/k8s/"

    - name: Apply manifests
      shell: |
        kubectl apply -f /home/{{ ansible_user }}/k8s/namespace.yml
        kubectl apply -f /home/{{ ansible_user }}/k8s/postgres.yml
        kubectl apply -f /home/{{ ansible_user }}/k8s/backend.yml
        kubectl apply -f /home/{{ ansible_user }}/k8s/frontend.yml
