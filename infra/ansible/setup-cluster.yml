---
# --- Prérequis sur tous les noeuds ---
- name: Setup common packages
  hosts: k3s_cluster
  become: true
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - curl
          - git
          - htop
          - jq
        state: present

# --- Installer K3s Master ---
- name: Setup K3s Master
  hosts: k3s_master
  become: true
  tasks:
    - name: Install K3s server
      shell: |
        if ! command -v k3s &> /dev/null; then
          curl -sfL https://get.k3s.io | sh -s - \
            --write-kubeconfig-mode 644 \
            --node-name master
        fi
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for K3s to be ready
      shell: k3s kubectl get nodes
      register: k3s_ready
      retries: 10
      delay: 10
      until: k3s_ready.rc == 0

    - name: Get K3s token
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token

    - name: Store token
      set_fact:
        k3s_master_token: "{{ k3s_token.content | b64decode | trim }}"

    - name: Setup kubeconfig for ubuntu user
      shell: |
        mkdir -p /home/ubuntu/.kube
        cp /etc/rancher/k3s/k3s.yaml /home/ubuntu/.kube/config
        chown -R ubuntu:ubuntu /home/ubuntu/.kube

# --- Joindre le Worker ---
- name: Setup K3s Worker
  hosts: k3s_worker
  become: true
  tasks:
    - name: Install K3s agent
      shell: |
        if ! command -v k3s &> /dev/null; then
          curl -sfL https://get.k3s.io | K3S_URL=https://{{ hostvars[groups['k3s_master'][0]].ansible_host }}:6443 \
            K3S_TOKEN={{ hostvars[groups['k3s_master'][0]].k3s_master_token }} \
            sh -s - --node-name worker
        fi
      args:
        creates: /usr/local/bin/k3s
