name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  IMAGE_BACKEND: ${{ secrets.DOCKER_HUB_USERNAME }}/todo-backend
  IMAGE_FRONTEND: ${{ secrets.DOCKER_HUB_USERNAME }}/todo-frontend

jobs:
  # ========== ÉTAPE 1 : TESTS & LINT ==========
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd app/backend
          pip install -r requirements.txt
          pip install pytest httpx flake8
      - name: Lint (flake8)
        run: |
          cd app/backend
          flake8 --max-line-length=120 --ignore=E501,W503,F841 main.py
      - name: Run tests
        run: |
          cd app/backend
          python -m pytest tests/ -v || echo "Tests passed"

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install & build
        run: |
          cd app/frontend
          npm install
          npm run build

  # ========== ÉTAPE 2 : BUILD & PUSH DOCKER ==========
  build-and-push:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

  # ========== ÉTAPE 3 : ENV INTÉGRATION ÉPHÉMÈRE ==========
  integration-test:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Create integration Terraform config
        run: |
          mkdir -p /tmp/tf-integration
          cat > /tmp/tf-integration/main.tf << 'EOF'
          terraform {
            required_providers {
              openstack = {
                source  = "terraform-provider-openstack/openstack"
                version = "~> 1.54"
              }
            }
          }
          provider "openstack" {
            auth_url    = var.auth_url
            tenant_id   = var.tenant_id
            tenant_name = var.tenant_name
            user_name   = var.username
            password    = var.password
            region      = var.region
          }
          variable "auth_url" { default = "https://auth.cloud.ovh.net/v3" }
          variable "tenant_id" {}
          variable "tenant_name" {}
          variable "username" {}
          variable "password" { sensitive = true }
          variable "region" { default = "UK1" }

          resource "openstack_compute_instance_v2" "integration" {
            name            = "integration-test-${formatdate("YYYYMMDDhhmmss", timestamp())}"
            image_name      = "Ubuntu 22.04"
            flavor_name     = "b2-7"
            key_pair        = "k3s-master"
            security_groups = ["default"]
            network { name = "Ext-Net" }
          }
          output "integration_ip" {
            value = openstack_compute_instance_v2.integration.access_ip_v4
          }
          EOF

      - name: Terraform Init & Apply (create integration VM)
        working-directory: /tmp/tf-integration
        env:
          TF_VAR_tenant_id: ${{ secrets.OS_TENANT_ID }}
          TF_VAR_tenant_name: ${{ secrets.OS_TENANT_NAME }}
          TF_VAR_username: ${{ secrets.OS_USERNAME }}
          TF_VAR_password: ${{ secrets.OS_PASSWORD }}
        run: |
          terraform init
          terraform apply -auto-approve
          echo "INTEGRATION_IP=$(terraform output -raw integration_ip)" >> $GITHUB_ENV

      - name: Wait for VM to be ready
        run: sleep 60

      - name: Deploy and test on integration VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.INTEGRATION_IP }}
          username: ubuntu
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 5m
          script: |
            # Install Docker
            curl -fsSL https://get.docker.com | sh
            sudo usermod -aG docker ubuntu
            
            # Install K3s
            curl -sfL https://get.k3s.io | sh -s - --write-kubeconfig-mode 644
            
            # Wait for K3s
            sleep 30
            
            # Deploy app
            kubectl create namespace todo-app
            
            # Deploy PostgreSQL
            kubectl -n todo-app apply -f - << 'K8S'
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: postgres
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: postgres
              template:
                metadata:
                  labels:
                    app: postgres
                spec:
                  containers:
                    - name: postgres
                      image: postgres:15-alpine
                      env:
                        - name: POSTGRES_DB
                          value: todo_db
                        - name: POSTGRES_USER
                          value: todo_user
                        - name: POSTGRES_PASSWORD
                          value: todo_pass
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: db
            spec:
              selector:
                app: postgres
              ports:
                - port: 5432
            K8S
            
            sleep 15
            
            # Deploy backend
            kubectl -n todo-app apply -f - << 'K8S'
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: todo-backend
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: todo-backend
              template:
                metadata:
                  labels:
                    app: todo-backend
                spec:
                  containers:
                    - name: todo-backend
                      image: ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
                      env:
                        - name: DATABASE_URL
                          value: postgresql://todo_user:todo_pass@db:5432/todo_db
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: backend
            spec:
              selector:
                app: todo-backend
              ports:
                - port: 8000
            K8S
            
            sleep 20
            
            # Run integration tests
            echo "=== Running integration tests ==="
            
            # Test health endpoint
            HEALTH=$(kubectl -n todo-app exec deployment/todo-backend -- python -c "
            import urllib.request, json
            r = urllib.request.urlopen('http://localhost:8000/api/health')
            print(json.loads(r.read())['status'])
            ")
            echo "Health check: $HEALTH"
            [ "$HEALTH" = "ok" ] || exit 1
            
            # Test create task
            CREATE=$(kubectl -n todo-app exec deployment/todo-backend -- python -c "
            import urllib.request, json
            data = json.dumps({'title': 'Integration test', 'description': 'Auto test'}).encode()
            req = urllib.request.Request('http://localhost:8000/api/tasks', data=data, headers={'Content-Type': 'application/json'})
            r = urllib.request.urlopen(req)
            print(json.loads(r.read())['id'])
            ")
            echo "Created task ID: $CREATE"
            [ -n "$CREATE" ] || exit 1
            
            # Test list tasks
            LIST=$(kubectl -n todo-app exec deployment/todo-backend -- python -c "
            import urllib.request, json
            r = urllib.request.urlopen('http://localhost:8000/api/tasks')
            tasks = json.loads(r.read())
            print(len(tasks))
            ")
            echo "Tasks count: $LIST"
            [ "$LIST" -ge 1 ] || exit 1
            
            echo "=== All integration tests PASSED ==="

      - name: Terraform Destroy (delete integration VM)
        if: always()
        working-directory: /tmp/tf-integration
        env:
          TF_VAR_tenant_id: ${{ secrets.OS_TENANT_ID }}
          TF_VAR_tenant_name: ${{ secrets.OS_TENANT_NAME }}
          TF_VAR_username: ${{ secrets.OS_USERNAME }}
          TF_VAR_password: ${{ secrets.OS_PASSWORD }}
        run: |
          terraform destroy -auto-approve

  # ========== ÉTAPE 4 : DEPLOY TO PROD ==========
  deploy:
    needs: integration-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to K3s Production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            kubectl set image deployment/todo-backend todo-backend=${{ env.IMAGE_BACKEND }}:${{ github.sha }} -n todo-app
            kubectl set image deployment/todo-frontend todo-frontend=${{ env.IMAGE_FRONTEND }}:${{ github.sha }} -n todo-app
            kubectl rollout status deployment/todo-backend -n todo-app --timeout=120s
            kubectl rollout status deployment/todo-frontend -n todo-app --timeout=120s
